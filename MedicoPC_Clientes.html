<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clientes MedicoPC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b12;color:#e8e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{display:grid;grid-template-columns:340px 1fr;min-height:100vh}

.sidebar{background:#0f0f1a;border-right:1px solid rgba(255,255,255,.06);padding:20px;display:flex;flex-direction:column;min-height:100vh;max-height:100vh;overflow:hidden}
.sidebar-header{margin-bottom:14px}
h1{font-size:16px;font-weight:700;color:#e8185a;margin-bottom:2px}
.sub{font-size:11px;color:rgba(255,255,255,.35)}

.search-box{position:relative;margin-bottom:10px}
.search-box input{width:100%;background:#1a1a26;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 12px 10px 34px;color:#e8e8f0;font-size:13px;font-family:inherit}
.search-box input:focus{outline:none;border-color:#e8185a}
.search-box input::placeholder{color:rgba(255,255,255,.3)}
.search-box::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5}

.filter-row{display:flex;gap:6px;margin-bottom:14px}
.filter-btn{flex:1;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 8px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn.active{background:rgba(232,24,90,.15);border-color:#e8185a;color:#ff6b9e}
.filter-btn:hover:not(.active){border-color:rgba(255,255,255,.25);color:#e8e8f0}

.btn-new{background:#e8185a;border:none;border-radius:10px;padding:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-new:hover{background:#d01450}

.client-list{flex:1;overflow-y:auto;margin:0 -8px;padding:0 8px}
.client-list::-webkit-scrollbar{width:6px}
.client-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

.client-item{background:#1a1a26;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .12s}
.client-item:hover{border-color:rgba(232,24,90,.4);background:#1f1f30}
.client-item.active{border-color:#e8185a;background:rgba(232,24,90,.1)}
.client-name{font-size:13px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.client-tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.client-tag.particular{background:rgba(123,159,255,.18);color:#7b9fff}
.client-tag.pyme{background:rgba(240,180,60,.18);color:#f0b43c}
.client-meta{font-size:11px;color:rgba(255,255,255,.4);display:flex;justify-content:space-between}

.empty-list{text-align:center;padding:40px 10px;color:rgba(255,255,255,.35);font-size:12px;line-height:1.5}

.content{padding:24px 32px;overflow-y:auto;max-height:100vh}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;color:rgba(255,255,255,.35);font-size:14px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}

.detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.detail-title{font-size:22px;font-weight:700;color:#e8e8f0;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.detail-title .client-tag{font-size:10px}
.detail-meta{font-size:12px;color:rgba(255,255,255,.4)}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}

.btn{border:none;border-radius:10px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-wa{background:#25d366;color:#0b0b12}
.btn-wa:hover{background:#1ebe57}
.btn-call{background:rgba(123,159,255,.18);color:#7b9fff;border:1px solid rgba(123,159,255,.3)}
.btn-call:hover{background:rgba(123,159,255,.28)}
.btn-edit{background:rgba(255,255,255,.08);color:#e8e8f0;border:1px solid rgba(255,255,255,.1)}
.btn-edit:hover{background:rgba(255,255,255,.14)}
.btn-del{background:transparent;border:1px solid rgba(232,24,90,.3);color:#ff6b9e}
.btn-del:hover{background:rgba(232,24,90,.15)}
.btn-add-int{background:#e8185a;color:#fff}
.btn-add-int:hover{background:#d01450}

.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.info-card{background:#1a1a26;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px}
.info-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.info-value{font-size:13px;color:#e8e8f0;word-break:break-word}
.info-value.muted{color:rgba(255,255,255,.3);font-style:italic}

.section-title{font-size:12px;font-weight:700;color:#e8185a;margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between;gap:8px}
.int-count{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;text-transform:none;letter-spacing:0}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#0f0f1a;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px}
.stat-label{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.stat-value{font-size:18px;font-weight:700;color:#00c882;margin-top:2px}

.int-list{display:flex;flex-direction:column;gap:8px}
.int-item{background:#1a1a26;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;display:grid;grid-template-columns:80px 1fr 100px 30px;gap:12px;align-items:center}
.int-date{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
.int-svc{font-size:13px;color:#e8e8f0}
.int-notas{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.int-price{font-size:14px;font-weight:700;color:#00c882;text-align:right}
.int-del{background:transparent;border:none;color:rgba(255,255,255,.3);font-size:16px;cursor:pointer;padding:0;width:24px;height:24px;border-radius:6px}
.int-del:hover{color:#ff6b9e;background:rgba(232,24,90,.1)}

.notas-card{background:#1a1a26;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;margin-bottom:20px}
.notas-text{font-size:13px;color:rgba(255,255,255,.65);white-space:pre-wrap;line-height:1.5;min-height:20px}
.notas-text.muted{color:rgba(255,255,255,.3);font-style:italic}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#0f0f1a;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#e8185a;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;background:#1a1a26;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 12px;color:#e8e8f0;font-size:13px;font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#e8185a}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.55)}
.btn-cancel:hover{border-color:rgba(255,255,255,.35);color:#fff}
.btn-save{background:#e8185a;color:#fff;border:none}
.btn-save:hover{background:#d01450}

.toast{position:fixed;top:20px;right:20px;background:#00c882;color:#0b0b12;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transform:translateY(-10px);transition:all .25s;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateY(0)}

.back-btn{display:none;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;margin-bottom:10px;padding:6px 0;font-family:inherit}
.back-btn:hover{color:#e8185a}

@media (max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{max-height:none;min-height:auto;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .sidebar.hidden-mobile{display:none}
  .content{max-height:none;padding:20px}
  .back-btn.show{display:block}
  .int-item{grid-template-columns:1fr auto;gap:8px}
  .int-date,.int-svc{grid-column:1}
  .int-price{grid-column:2;grid-row:1}
  .int-del{grid-column:2;grid-row:2}
}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>👥 Clientes MedicoPC</h1>
      <p class="sub" id="client-count">0 clientes</p>
    </div>
    <div class="search-box">
      <input id="search" type="text" placeholder="Buscar por nombre, teléfono...">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="particular">Particular</button>
      <button class="filter-btn" data-filter="pyme">Pyme</button>
    </div>
    <button class="btn-new" onclick="openClientModal()">+ Nuevo cliente</button>
    <div class="client-list" id="client-list"></div>
  </aside>

  <main class="content" id="content">
    <button class="back-btn" onclick="backToList()">← Volver al listado</button>
    <div id="detail-area"></div>
  </main>
</div>

<div class="modal-bg" id="client-modal">
  <div class="modal">
    <div class="modal-title" id="client-modal-title">Nuevo cliente</div>
    <div class="field">
      <label>Nombre *</label>
      <input id="f-nombre" type="text" placeholder="Juan Pérez / Taller Pepe SL">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Teléfono</label>
        <input id="f-telefono" type="tel" placeholder="612345678">
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="f-tipo">
          <option value="particular">Particular</option>
          <option value="pyme">Pyme</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Dirección</label>
      <input id="f-direccion" type="text" placeholder="Calle, número, Madrid">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="f-email" type="email" placeholder="cliente@email.com">
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea id="f-notas" placeholder="Observaciones, equipo del cliente, preferencias..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeClientModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveClient()">Guardar</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="int-modal">
  <div class="modal">
    <div class="modal-title">Nueva intervención</div>
    <div class="field-row">
      <div class="field">
        <label>Fecha</label>
        <input id="i-fecha" type="date">
      </div>
      <div class="field">
        <label>Precio (€)</label>
        <input id="i-precio" type="number" min="0" step="0.01" placeholder="0">
      </div>
    </div>
    <div class="field">
      <label>Servicio *</label>
      <input id="i-servicio" type="text" placeholder="Formateo + Windows / Limpieza de virus...">
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea id="i-notas" placeholder="Detalles de la intervención, piezas, incidencias..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeIntModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveInt()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'medicopc_clientes_v1';

let state = {
  clientes: [],
  search: '',
  filter: 'todos',
  selectedId: null,
  editingId: null,
  editingIntId: null
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.clientes = data.clientes || [];
    }
  } catch(e) { console.error(e); }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({clientes: state.clientes}));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-ES', {day:'2-digit', month:'short', year:'numeric'});
}

function formatEur(n) {
  return (Math.round((n||0)*100)/100).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2}) + ' €';
}

function filteredClients() {
  const q = state.search.trim().toLowerCase();
  return state.clientes.filter(c => {
    if (state.filter !== 'todos' && c.tipo !== state.filter) return false;
    if (!q) return true;
    return (c.nombre||'').toLowerCase().includes(q)
        || (c.telefono||'').toLowerCase().includes(q)
        || (c.direccion||'').toLowerCase().includes(q)
        || (c.email||'').toLowerCase().includes(q);
  }).sort((a,b) => (a.nombre||'').localeCompare(b.nombre||''));
}

function renderList() {
  const list = filteredClients();
  document.getElementById('client-count').textContent = state.clientes.length + (state.clientes.length === 1 ? ' cliente' : ' clientes');
  const c = document.getElementById('client-list');
  if (!list.length) {
    c.innerHTML = '<div class="empty-list">' + (state.clientes.length ? 'Sin resultados para esta búsqueda' : 'Aún no hay clientes.<br>Pulsa <b>+ Nuevo cliente</b> para empezar.') + '</div>';
    return;
  }
  c.innerHTML = list.map(cl => {
    const last = cl.intervenciones && cl.intervenciones.length ? cl.intervenciones[cl.intervenciones.length-1] : null;
    return '<div class="client-item' + (state.selectedId === cl.id ? ' active':'') + '" onclick="selectClient(\'' + cl.id + '\')">' +
      '<div class="client-name">' + escapeHtml(cl.nombre) + ' <span class="client-tag ' + cl.tipo + '">' + cl.tipo + '</span></div>' +
      '<div class="client-meta"><span>' + escapeHtml(cl.telefono || 'Sin teléfono') + '</span><span>' + (last ? formatDate(last.fecha) : '—') + '</span></div>' +
    '</div>';
  }).join('');
}

function selectClient(id) {
  state.selectedId = id;
  renderList();
  renderDetail();
  if (window.innerWidth <= 820) {
    document.getElementById('sidebar').classList.add('hidden-mobile');
    document.querySelector('.back-btn').classList.add('show');
  }
}

function backToList() {
  document.getElementById('sidebar').classList.remove('hidden-mobile');
  document.querySelector('.back-btn').classList.remove('show');
  state.selectedId = null;
  renderList();
  renderDetail();
}

function renderDetail() {
  const area = document.getElementById('detail-area');
  const cl = state.clientes.find(c => c.id === state.selectedId);
  if (!cl) {
    area.innerHTML = '<div class="empty"><div class="empty-icon">👈</div>Selecciona un cliente o crea uno nuevo para ver sus datos.</div>';
    return;
  }
  const ints = (cl.intervenciones||[]).slice().sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  const totalInt = ints.reduce((a,b) => a + (parseFloat(b.precio)||0), 0);
  const phoneDigits = (cl.telefono||'').replace(/\D/g,'');
  const waNum = phoneDigits ? (phoneDigits.startsWith('34') || phoneDigits.length > 9 ? phoneDigits : '34' + phoneDigits) : '';

  let html = '<div class="detail-header"><div>' +
    '<div class="detail-title">' + escapeHtml(cl.nombre) + ' <span class="client-tag ' + cl.tipo + '">' + cl.tipo + '</span></div>' +
    '<div class="detail-meta">' + (cl.creado ? 'Cliente desde ' + formatDate(cl.creado) : '') + '</div>' +
    '</div><div class="detail-actions">';

  if (waNum) html += '<a class="btn btn-wa" href="https://wa.me/' + waNum + '" target="_blank">💬 WhatsApp</a>';
  if (phoneDigits) html += '<a class="btn btn-call" href="tel:' + phoneDigits + '">📞 Llamar</a>';
  html += '<button class="btn btn-edit" onclick="openClientModal(\'' + cl.id + '\')">✎ Editar</button>';
  html += '<button class="btn btn-del" onclick="deleteClient(\'' + cl.id + '\')">🗑 Borrar</button>';
  html += '</div></div>';

  html += '<div class="info-grid">' +
    infoCard('Teléfono', cl.telefono) +
    infoCard('Dirección', cl.direccion) +
    infoCard('Email', cl.email) +
  '</div>';

  html += '<div class="stats-row">' +
    '<div class="stat-card"><div class="stat-label">Intervenciones</div><div class="stat-value">' + ints.length + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Facturado</div><div class="stat-value">' + formatEur(totalInt) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Última visita</div><div class="stat-value" style="font-size:14px;color:#e8e8f0">' + (ints[0] ? formatDate(ints[0].fecha) : '—') + '</div></div>' +
  '</div>';

  if (cl.notas && cl.notas.trim()) {
    html += '<div class="section-title">Notas</div><div class="notas-card"><div class="notas-text">' + escapeHtml(cl.notas) + '</div></div>';
  }

  html += '<div class="section-title">Historial de intervenciones <span class="int-count">' + ints.length + ' registros</span></div>';
  html += '<div style="margin-bottom:12px"><button class="btn btn-add-int" onclick="openIntModal()">+ Nueva intervención</button></div>';

  if (!ints.length) {
    html += '<div class="empty-list" style="background:#1a1a26;border-radius:12px">Aún no hay intervenciones registradas para este cliente.</div>';
  } else {
    html += '<div class="int-list">';
    ints.forEach(int => {
      html += '<div class="int-item">' +
        '<div class="int-date">' + formatDate(int.fecha) + '</div>' +
        '<div><div class="int-svc">' + escapeHtml(int.servicio) + '</div>' +
        (int.notas ? '<div class="int-notas">' + escapeHtml(int.notas) + '</div>' : '') +
        '</div>' +
        '<div class="int-price">' + formatEur(int.precio) + '</div>' +
        '<button class="int-del" onclick="deleteInt(\'' + int.id + '\')" title="Borrar">×</button>' +
      '</div>';
    });
    html += '</div>';
  }

  area.innerHTML = html;
}

function infoCard(label, value) {
  const val = value && value.trim() ? escapeHtml(value) : '<span class="muted">—</span>';
  return '<div class="info-card"><div class="info-label">' + label + '</div><div class="info-value">' + val + '</div></div>';
}

function openClientModal(id) {
  state.editingId = id || null;
  const cl = id ? state.clientes.find(c => c.id === id) : null;
  document.getElementById('client-modal-title').textContent = cl ? 'Editar cliente' : 'Nuevo cliente';
  document.getElementById('f-nombre').value = cl ? cl.nombre||'' : '';
  document.getElementById('f-telefono').value = cl ? cl.telefono||'' : '';
  document.getElementById('f-tipo').value = cl ? cl.tipo||'particular' : 'particular';
  document.getElementById('f-direccion').value = cl ? cl.direccion||'' : '';
  document.getElementById('f-email').value = cl ? cl.email||'' : '';
  document.getElementById('f-notas').value = cl ? cl.notas||'' : '';
  document.getElementById('client-modal').classList.add('show');
  setTimeout(() => document.getElementById('f-nombre').focus(), 50);
}

function closeClientModal() {
  document.getElementById('client-modal').classList.remove('show');
  state.editingId = null;
}

function saveClient() {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', true); return; }
  const data = {
    nombre,
    telefono: document.getElementById('f-telefono').value.trim(),
    tipo: document.getElementById('f-tipo').value,
    direccion: document.getElementById('f-direccion').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    notas: document.getElementById('f-notas').value.trim()
  };
  if (state.editingId) {
    const cl = state.clientes.find(c => c.id === state.editingId);
    Object.assign(cl, data);
  } else {
    const cl = Object.assign({id: uid(), creado: new Date().toISOString(), intervenciones: []}, data);
    state.clientes.push(cl);
    state.selectedId = cl.id;
  }
  save();
  closeClientModal();
  renderList();
  renderDetail();
  showToast('Cliente guardado');
}

function deleteClient(id) {
  const cl = state.clientes.find(c => c.id === id);
  if (!cl) return;
  if (!confirm('¿Borrar a ' + cl.nombre + ' y todo su historial? Esta acción no se puede deshacer.')) return;
  state.clientes = state.clientes.filter(c => c.id !== id);
  if (state.selectedId === id) state.selectedId = null;
  save();
  renderList();
  renderDetail();
  showToast('Cliente eliminado');
}

function openIntModal() {
  if (!state.selectedId) return;
  document.getElementById('i-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('i-servicio').value = '';
  document.getElementById('i-precio').value = '';
  document.getElementById('i-notas').value = '';
  document.getElementById('int-modal').classList.add('show');
  setTimeout(() => document.getElementById('i-servicio').focus(), 50);
}

function closeIntModal() {
  document.getElementById('int-modal').classList.remove('show');
}

function saveInt() {
  const servicio = document.getElementById('i-servicio').value.trim();
  if (!servicio) { showToast('El servicio es obligatorio', true); return; }
  const cl = state.clientes.find(c => c.id === state.selectedId);
  if (!cl) return;
  if (!cl.intervenciones) cl.intervenciones = [];
  cl.intervenciones.push({
    id: uid(),
    fecha: document.getElementById('i-fecha').value || new Date().toISOString().slice(0,10),
    servicio,
    precio: parseFloat(document.getElementById('i-precio').value) || 0,
    notas: document.getElementById('i-notas').value.trim()
  });
  save();
  closeIntModal();
  renderDetail();
  renderList();
  showToast('Intervención añadida');
}

function deleteInt(intId) {
  const cl = state.clientes.find(c => c.id === state.selectedId);
  if (!cl || !cl.intervenciones) return;
  const int = cl.intervenciones.find(i => i.id === intId);
  if (!int) return;
  if (!confirm('¿Borrar la intervención "' + int.servicio + '"?')) return;
  cl.intervenciones = cl.intervenciones.filter(i => i.id !== intId);
  save();
  renderDetail();
  renderList();
  showToast('Intervención borrada');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#e8185a' : '#00c882';
  t.style.color = isError ? '#fff' : '#0b0b12';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  renderList();
});

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.filter = b.dataset.filter;
    renderList();
  });
});

document.querySelectorAll('.modal-bg').forEach(m => {
  m.addEventListener('click', e => {
    if (e.target === m) m.classList.remove('show');
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.show').forEach(m => m.classList.remove('show'));
});

load();
renderList();
renderDetail();
</script>

</body>
</html>
